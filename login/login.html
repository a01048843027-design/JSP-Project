<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniSync — 로그인</title>
  <link rel="stylesheet" href="login_v4.css">
</head>
<body>
<div class="login-wrap">

  <!-- ══ 왼쪽 브랜드 패널 ══ -->
  <div class="brand-panel">
    <div class="brand-top">
      <div class="brand-logo">Uni<span>Sync</span></div>
    </div>
    <div class="brand-mid">
      <div class="brand-headline">
        질문의 장벽을 낮추고,<br>
        <em>수업의 데이터를</em><br>
        높이다.
      </div>
    </div>
    <div class="brand-features">
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="feature-text">
          <strong>실시간 익명 Q&A</strong>
          <span>질문 부담 없이, 수업에 집중</span>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="feature-text">
          <strong>Smart Lock 시스템</strong>
          <span>수업 시간 기반 자동 권한 제어</span>
        </div>
      </div>
      <div class="feature-item">
        <div class="feature-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div class="feature-text">
          <strong>참여 데이터 관리</strong>
          <span>퀴즈·활동 점수 Excel 추출</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 오른쪽 폼 패널 ══ -->
  <div class="form-panel">
    <div class="form-inner">

      <!-- 1. 로그인 -->
      <div id="formLogin">
        <div class="form-header">
          <div class="form-title">로그인</div>
          <div class="form-sub">학번 또는 교번으로 로그인하세요.</div>
        </div>
        <form onsubmit="handleLogin(event)" autocomplete="off">
          <div class="field-group">
            <label class="field-label" for="loginId">아이디 (학번 / 교번)</label>
            <input class="field-input" id="loginId" type="text" placeholder="예: 2021038" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="loginPw">비밀번호</label>
            <div class="pw-wrap">
              <input class="field-input" id="loginPw" type="password" placeholder="비밀번호 입력" required>
              <button type="button" class="pw-eye" onclick="togglePw('loginPw',this)">
                <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>
                <svg class="eye-on" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit">로그인</button>
        </form>
        <div class="form-divider"><span>처음이신가요?</span></div>
        <div class="slide-tabs" id="regTabs">
          <div class="slide-indicator" id="regIndicator"></div>
          <button class="stab-btn stab-active" id="stab-s"
                  onmouseenter="hoverTab('s')"
                  onmouseleave="leaveTab()"
                  onclick="selectTab('s')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            학생으로 가입
          </button>
          <button class="stab-btn" id="stab-p"
                  onmouseenter="hoverTab('p')"
                  onmouseleave="leaveTab()"
                  onclick="selectTab('p')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            교수자로 가입
          </button>
        </div>
      </div>

      <!-- 2. 학생 회원가입 -->
      <div id="formRegStudent" style="display:none;">
        <button class="back-btn" onclick="showForm('formLogin')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          돌아가기
        </button>
        <div class="form-header">
          <div class="form-title">회원가입</div>
          <div class="role-badge badge-student" style="margin-top:8px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            학생 가입
          </div>
        </div>
        <form onsubmit="handleRegStudent(event)" autocomplete="off">
          <div class="field-group">
            <label class="field-label" for="sName">이름</label>
            <input class="field-input" id="sName" type="text" placeholder="홍길동" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="sId">학번</label>
            <input class="field-input" id="sId" type="text" placeholder="예: 2021038" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="sPw">비밀번호</label>
            <div class="pw-wrap">
              <input class="field-input" id="sPw" type="password" placeholder="8자 이상" required oninput="checkStr(this.value)">
              <button type="button" class="pw-eye" onclick="togglePw('sPw',this)">
                <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>
                <svg class="eye-on" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="pw-strength" id="pwStr" style="display:none;">
              <div class="pw-bar"><div class="pw-fill" id="pwFill"></div></div>
              <span class="pw-label" id="pwLabel"></span>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label" for="sPw2">비밀번호 확인</label>
            <div class="pw-wrap">
              <input class="field-input" id="sPw2" type="password" placeholder="비밀번호 재입력" required>
              <button type="button" class="pw-eye" onclick="togglePw('sPw2',this)">
                <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>
                <svg class="eye-on" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <button type="submit" class="btn-submit">학생으로 가입하기</button>
        </form>
      </div>

      <!-- 3. 교수 회원가입 -->
      <div id="formRegProf" style="display:none;">
        <button class="back-btn" onclick="showForm('formLogin')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          돌아가기
        </button>
        <div class="form-header">
          <div class="form-title">교수 회원가입</div>
          <div class="role-badge badge-prof" style="margin-top:8px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            교수자 가입
          </div>
        </div>
                <form onsubmit="handleRegProf(event)" autocomplete="off">
          <div class="field-group">
            <label class="field-label" for="pName">이름</label>
            <input class="field-input" id="pName" type="text" placeholder="홍길동" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="pId">교번</label>
            <input class="field-input" id="pId" type="text" placeholder="예: P2024001" required>
          </div>
          <div class="field-group">
            <label class="field-label" for="pPw">비밀번호</label>
            <div class="pw-wrap">
              <input class="field-input" id="pPw" type="password" placeholder="8자 이상" required>
              <button type="button" class="pw-eye" onclick="togglePw('pPw',this)">
                <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>
                <svg class="eye-on" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="field-group">
            <label class="field-label" for="pPw2">비밀번호 확인</label>
            <div class="pw-wrap">
              <input class="field-input" id="pPw2" type="password" placeholder="비밀번호 재입력" required>
              <button type="button" class="pw-eye" onclick="togglePw('pPw2',this)">
                <svg class="eye-off" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22"/></svg>
                <svg class="eye-on" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" style="display:none;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <!-- 인증코드 -->
          <div class="code-section">
            <div class="code-section-head">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              교수 인증코드
            </div>
            <div class="code-section-desc">관리자에게 발급받은 코드를 입력하세요. 코드가 없으면 학교 담당자에게 문의하세요.</div>
            <input class="code-input" id="profCode" type="text" placeholder="예: PROF-A3K9F2" maxlength="12" required>
          </div>
          <button type="submit" class="btn-submit btn-submit-prof">교수자로 가입하기</button>
        </form>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── 슬라이딩 탭 ── */
  var selectedTab = 's';
  function hoverTab(side) {
    document.getElementById('regTabs').classList.toggle('tab-right', side === 'p');
    document.getElementById('stab-s').classList.toggle('stab-active', side === 's');
    document.getElementById('stab-p').classList.toggle('stab-active', side === 'p');
  }
  function leaveTab() {
    document.getElementById('regTabs').classList.toggle('tab-right', selectedTab === 'p');
    document.getElementById('stab-s').classList.toggle('stab-active', selectedTab === 's');
    document.getElementById('stab-p').classList.toggle('stab-active', selectedTab === 'p');
  }
  function selectTab(side) {
    selectedTab = side;
    leaveTab();
    showForm(side === 's' ? 'formRegStudent' : 'formRegProf');
  }

  function showForm(id) {
    ['formLogin','formRegStudent','formRegProf'].forEach(function(f) {
      document.getElementById(f).style.display = 'none';
    });
    document.getElementById(id).style.display = 'block';
    var fp = document.querySelector('.form-panel');
    var fi = document.querySelector('.form-inner');
    if (id === 'formLogin') {
      fp.style.overflowY = 'hidden';
      fp.style.alignItems = 'center';
      fi.style.paddingTop = '0';
      fi.style.paddingBottom = '0';
    } else {
      fp.style.overflowY = 'auto';
      fp.style.alignItems = 'flex-start';
      fi.style.paddingTop = 'max(40px, calc((100vh - 620px) / 2))';
      fi.style.paddingBottom = '40px';
    }
    var c = document.getElementById('profCode');
    if (c && !c._b) {
      c.addEventListener('input', function() {
        var p = this.selectionStart;
        this.value = this.value.toUpperCase();
        this.setSelectionRange(p, p);
      });
      c._b = true;
    }
  }
  function togglePw(id, btn) {
    var inp = document.getElementById(id);
    var isText = inp.type === 'text';
    inp.type = isText ? 'password' : 'text';
    btn.querySelector('.eye-off').style.display = isText ? '' : 'none';
    btn.querySelector('.eye-on').style.display  = isText ? 'none' : '';
    btn.style.color = isText ? '' : 'var(--primary)';
  }
  function checkStr(v) {
    var wrap = document.getElementById('pwStr');
    var fill = document.getElementById('pwFill');
    var lbl  = document.getElementById('pwLabel');
    if (!v) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    var s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]|[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    var lvl = [
      {c:'weak', t:'취약한 비밀번호'},
      {c:'mid',  t:'보통 비밀번호'},
      {c:'strong',t:'강한 비밀번호'}
    ][Math.min(s,2)];
    fill.className = 'pw-fill ' + lvl.c;
    lbl.className  = 'pw-label ' + lvl.c;
    lbl.textContent = lvl.t;
  }
  function handleLogin(e) { e.preventDefault(); showToast('백엔드 연동 후 동작합니다.'); }
  function handleRegStudent(e) {
    e.preventDefault();
    if (document.getElementById('sPw').value !== document.getElementById('sPw2').value) {
      showToast('비밀번호가 일치하지 않습니다.', 'error'); return;
    }
    showToast('백엔드 연동 후 동작합니다.');
  }
  function handleRegProf(e) {
    e.preventDefault();
    if (document.getElementById('pPw').value !== document.getElementById('pPw2').value) {
      showToast('비밀번호가 일치하지 않습니다.', 'error'); return;
    }
    showToast('백엔드 연동 후 동작합니다.');
  }
  var _tt;
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show' + (type ? ' ' + type : '');
    clearTimeout(_tt);
    _tt = setTimeout(function() { el.classList.remove('show'); }, 2800);
  }
</script>
</body>
</html>
